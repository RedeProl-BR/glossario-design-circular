<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossário do Design Circular</title>
  <style>
    :root {
      --primary:      #007F91;
      --primary-dark: #005F6E;
      --primary-light:#009DB2;
      --primary-bg:   #CCE9ED;
      --primary-pale: #EAF6F8;
      --gray-100: #f7f9fa;
      --gray-200: #e8ecee;
      --gray-400: #aab4bb;
      --gray-600: #5f7178;
      --gray-800: #1e2d32;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 2.8rem 1.5rem 1.8rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -.5px; }
    header p  { margin-top: .4rem; opacity: .85; font-size: .95rem; }

    /* ── Search ──────────────────────────────── */
    .search-wrap {
      max-width: 580px;
      margin: 1.5rem auto 0;
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%); opacity: .5; pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: .7rem 1rem .7rem 2.8rem;
      border: none; border-radius: 50px;
      font-size: 1rem; outline: none;
      box-shadow: var(--shadow); color: var(--gray-800);
    }
    .search-wrap input::placeholder { color: var(--gray-400); }

    /* ── Alpha nav ───────────────────────────── */
    .alpha-nav {
      position: sticky; top: 0; z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: .6rem 1rem;
      display: flex; flex-wrap: wrap; gap: .25rem; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .alpha-nav a {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2rem; height: 2rem; border-radius: 6px;
      font-size: .82rem; font-weight: 700;
      color: var(--primary); text-decoration: none;
      transition: background .15s, color .15s;
    }
    .alpha-nav a.has-terms { background: var(--primary-pale); }
    .alpha-nav a.has-terms:hover { background: var(--primary); color: #fff; }
    .alpha-nav a.inactive { color: var(--gray-400); pointer-events: none; font-weight: 400; }

    /* ── Main ────────────────────────────────── */
    main { max-width: 860px; margin: 2rem auto 5rem; padding: 0 1rem; }

    /* ── Letter section ──────────────────────── */
    .letter-section { margin-bottom: 2.5rem; }
    .letter-section h2 {
      font-size: 1.75rem; font-weight: 800; color: var(--primary);
      border-bottom: 2px solid var(--primary-bg);
      padding-bottom: .3rem; margin-bottom: 1rem;
    }

    /* ── Term card ───────────────────────────── */
    .term-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.2rem 1.4rem;
      margin-bottom: .75rem; border-left: 4px solid var(--primary-light);
      transition: box-shadow .15s;
    }
    .term-card:hover { box-shadow: 0 3px 12px rgba(0,127,145,.12); }
    .term-card h3 {
      font-size: .95rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--primary-dark); margin-bottom: .5rem;
    }
    .term-card p { font-size: .93rem; line-height: 1.7; color: var(--gray-800); }
    .term-meta {
      margin-top: .65rem; display: flex;
      flex-wrap: wrap; align-items: center; gap: .3rem;
    }
    .tag {
      font-size: .72rem; background: var(--primary-pale);
      color: var(--primary-dark); border: 1px solid var(--primary-bg);
      border-radius: 50px; padding: .15rem .65rem;
    }
    .source-badge { font-size: .72rem; color: var(--gray-400); margin-left: auto; }

    /* ── Status ──────────────────────────────── */
    .status-msg {
      text-align: center; padding: 4rem 1rem; color: var(--gray-600);
    }
    .status-msg .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }

    /* ── Count badge ─────────────────────────── */
    .count-badge {
      display: inline-block;
      background: rgba(255,255,255,.2);
      border-radius: 50px;
      font-size: .8rem;
      padding: .2rem .8rem;
      margin-top: .7rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .alpha-nav a { width: 1.6rem; height: 1.6rem; font-size: .72rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Glossário do Design Circular</h1>
  <p>Termos e definições do universo da economia e design circular</p>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#fff"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
    <input type="text" id="search" placeholder="Buscar termo…" autocomplete="off" />
  </div>
  <div id="countBadge" class="count-badge"></div>
</header>

<nav class="alpha-nav" id="alphaNav"></nav>

<main id="main">
  <div class="status-msg">
    <span class="icon">⏳</span>Carregando termos…
  </div>
</main>

<script>
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

function normalize(str) {
  return String(str).normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase();
}
function firstLetter(t) { return normalize(t.term)[0].toUpperCase(); }
function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let terms = [];

async function loadTerms() {
  try {
    const res = await fetch('terms.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    terms = await res.json();
  } catch (e) {
    terms = [];
  }
  render(document.getElementById('search').value.trim());
}

function groupByLetter(list) {
  const map = {};
  ALPHABET.forEach(l => (map[l] = []));
  list.forEach(t => { const l = firstLetter(t); if (map[l]) map[l].push(t); });
  return map;
}

function sortedTerms(list) {
  return [...list].sort((a,b) => normalize(a.term).localeCompare(normalize(b.term),'pt-BR'));
}

function buildAlphaNav(grouped) {
  document.getElementById('alphaNav').innerHTML = ALPHABET.map(l => {
    const has = grouped[l]?.length > 0;
    return `<a href="${has ? '#letter-'+l : '#'}" class="${has ? 'has-terms' : 'inactive'}">${l}</a>`;
  }).join('');
}

function renderCard(t) {
  const tags = (t.tags||[]).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
  const source = t.source ? `<span class="source-badge">${escapeHtml(t.source)}</span>` : '';
  const defHtml = escapeHtml(t.definition).replace(/\n/g,'<br>');
  return `
    <div class="term-card">
      <h3>${escapeHtml(t.term)}</h3>
      <p>${defHtml}</p>
      <div class="term-meta">${tags}${source}</div>
    </div>`;
}

function render(filter) {
  const main = document.getElementById('main');
  const q = filter ? normalize(filter) : '';
  let list = sortedTerms(terms);
  if (q) list = list.filter(t => normalize(t.term).includes(q) || normalize(t.definition).includes(q));

  const badge = document.getElementById('countBadge');

  if (list.length === 0) {
    badge.textContent = '';
    buildAlphaNav(groupByLetter([]));
    main.innerHTML = `<div class="status-msg"><span class="icon">🔍</span>Nenhum resultado para <strong>"${escapeHtml(filter)}"</strong></div>`;
    return;
  }

  badge.textContent = q
    ? `${list.length} resultado${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}`
    : `${list.length} termos`;

  const grouped = groupByLetter(list);
  buildAlphaNav(grouped);
  main.innerHTML = ALPHABET.map(l => {
    const items = grouped[l];
    if (!items?.length) return '';
    return `<section class="letter-section" id="letter-${l}">
      <h2>${l}</h2>${items.map(renderCard).join('')}
    </section>`;
  }).join('');
}

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => render(e.target.value.trim()), 200);
});

loadTerms();
</script>
</body>
</html>
